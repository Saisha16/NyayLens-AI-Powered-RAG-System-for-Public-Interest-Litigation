services:
  # Backend API Service
  - type: web
    name: nyaylens-backend
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: API_TITLE
        value: NyayLens API
      - key: API_VERSION
        value: 1.0.0
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true

  # Static Frontend Service
  - type: static_site
    name: nyaylens-frontend
    buildCommand: echo "No build needed"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate

databases:
  # PostgreSQL Database (optional - currently using JSON)
  - name: nyaylens-db
    plan: free
    region: oregon
    databaseName: nyaylens
    user: nyaylens_user
