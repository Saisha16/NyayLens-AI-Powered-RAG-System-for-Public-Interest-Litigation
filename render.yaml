services:
  # Backend API Service
  - type: web
    name: nyaylens-backend
    env: python
    region: oregon
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      echo "✅ Build complete - skipping spaCy (free tier RAM constraint)"
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: API_TITLE
        value: NyayLens API
      - key: API_VERSION
        value: 1.0.0
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true

