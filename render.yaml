services:
  # Backend API Service
  - type: web
    name: nyaylens-backend
    env: python
    region: oregon
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      echo "📥 Pre-downloading spaCy model..." &&
      timeout 300 python -m spacy download en_core_web_sm 2>&1 | tail -5 ||
      echo "⚠️  spaCy download may have timed out, app will attempt on startup" &&
      echo "✅ Build complete"
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: API_TITLE
        value: NyayLens API
      - key: API_VERSION
        value: 1.0.0
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true

